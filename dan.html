<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0a00">
<title>Send a hug to Araceli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0d0a00;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
#app{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;position:relative;overflow:hidden;}
.bg-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,rgba(255,200,0,0.07) 0%,transparent 70%);pointer-events:none;}
.rainbow-top{position:absolute;top:0;left:0;right:0;height:180px;opacity:0;transition:opacity 1.2s;pointer-events:none;}
.rainbow-top.show{opacity:1;}
.status-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,200,0,0.35);border:1.5px solid rgba(255,200,0,0.5);margin:0 auto 32px;transition:all 0.4s;}
.status-dot.connected{background:#ffc800;border-color:#ffc800;box-shadow:0 0 8px rgba(255,200,0,0.6);}
.eyebrow{font-size:10px;letter-spacing:3px;color:rgba(255,200,80,0.4);text-transform:uppercase;margin-bottom:12px;}
.main-title{font-size:30px;color:rgba(255,220,100,0.92);font-weight:500;margin-bottom:8px;line-height:1.2;}
.subtitle{font-size:14px;color:rgba(255,200,100,0.45);line-height:1.7;margin-bottom:48px;}
.orb{width:160px;height:160px;border-radius:50%;background:rgba(255,200,0,0.12);border:2px solid rgba(255,200,0,0.25);display:flex;align-items:center;justify-content:center;font-size:64px;cursor:pointer;margin:0 auto 40px;transition:all 0.3s;}
.orb:active{transform:scale(0.95);}
.orb.sending{animation:orbSend 0.6s ease-in-out;}
.orb.sent{background:rgba(255,200,0,0.28);border-color:rgba(255,200,0,0.65);box-shadow:0 0 32px rgba(255,200,0,0.25);}
@keyframes orbSend{0%{transform:scale(1);}40%{transform:scale(1.1);}100%{transform:scale(1);}}
.send-btn{background:rgba(255,200,0,0.13);border:1.5px solid rgba(255,200,0,0.3);color:rgba(255,230,120,0.9);padding:18px 56px;border-radius:50px;font-size:18px;cursor:pointer;font-family:inherit;transition:all 0.25s;margin-bottom:16px;}
.send-btn:active{background:rgba(255,200,0,0.24);transform:scale(0.98);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.feedback{font-size:13px;color:rgba(255,200,80,0.5);min-height:20px;margin-bottom:32px;}
.divider{width:40px;height:1px;background:rgba(255,200,0,0.15);margin:0 auto 28px;}
.incoming-lbl{font-size:10px;letter-spacing:2px;color:rgba(255,200,80,0.3);text-transform:uppercase;margin-bottom:12px;}
.incoming-card{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,200,0,0.15);border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:14px;width:100%;}
.inc-dot{width:36px;height:36px;border-radius:50%;background:rgba(255,200,0,0.1);border:1px solid rgba(255,200,0,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all 0.4s;}
.inc-dot.glow{background:rgba(255,200,0,0.28);border-color:rgba(255,200,0,0.6);box-shadow:0 0 10px rgba(255,200,0,0.4);}
.inc-info{flex:1;text-align:left;}
.inc-title{font-size:13px;color:rgba(255,220,100,0.75);font-weight:500;}
.inc-sub{font-size:11px;color:rgba(255,200,80,0.38);margin-top:2px;}
.install-hint{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.18);padding:0 32px;line-height:1.6;}
</style>
</head>
<body>
<div id="app">
  <div class="bg-glow"></div>

  <svg class="rainbow-top" id="rainbow" viewBox="0 0 430 180" fill="none">
    <path d="M-20 170 Q215 -60 450 170" stroke="#ff4444" stroke-width="12" fill="none" opacity="0.5"/>
    <path d="M-10 170 Q215 -40 440 170" stroke="#ff8800" stroke-width="11" fill="none" opacity="0.5"/>
    <path d="M0 170 Q215 -18 430 170" stroke="#ffcc00" stroke-width="11" fill="none" opacity="0.5"/>
    <path d="M10 170 Q215 4 420 170" stroke="#44cc44" stroke-width="10" fill="none" opacity="0.5"/>
    <path d="M20 170 Q215 24 410 170" stroke="#4488ff" stroke-width="10" fill="none" opacity="0.5"/>
    <path d="M30 170 Q215 44 400 170" stroke="#8844ff" stroke-width="9" fill="none" opacity="0.5"/>
  </svg>

  <div class="status-dot" id="status-dot"></div>
  <div class="eyebrow">Mi Refugio</div>
  <div class="main-title">Send Araceli<br>a hug</div>
  <div class="subtitle">One tap. She'll feel it<br>wherever she is.</div>

  <div class="orb" id="orb">💛</div>
  <button class="send-btn" id="send-btn" onclick="sendHug()">Send a hug 💛</button>
  <div class="feedback" id="feedback"></div>

  <div class="divider"></div>
  <div class="incoming-lbl">From Araceli</div>
  <div class="incoming-card">
    <div class="inc-dot" id="inc-dot">💛</div>
    <div class="inc-info">
      <div class="inc-title" id="inc-title">Waiting for a hug back</div>
      <div class="inc-sub" id="inc-sub">When Araceli sends one, it'll appear here</div>
    </div>
  </div>

  <div class="install-hint">Tip: in Safari tap Share → "Add to Home Screen"<br>to keep this one tap away</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQfL3pLc89_ch5qR1U0WX-0e-ayh3VW5E",
  authDomain: "mi-refigio.firebaseapp.com",
  databaseURL: "https://mi-refigio-default-rtdb.firebaseio.com",
  projectId: "mi-refigio",
  storageBucket: "mi-refigio.firebasestorage.app",
  messagingSenderId: "486291568383",
  appId: "1:486291568383:web:65b20cd8d51bdeb7483eca"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById('status-dot').classList.add('connected');

let cooldown = false;
window.sendHug = async () => {
  if (cooldown) return;
  cooldown = true;
  const btn = document.getElementById('send-btn');
  const orb = document.getElementById('orb');
  const fb = document.getElementById('feedback');
  const rainbow = document.getElementById('rainbow');
  btn.disabled = true;
  orb.classList.add('sending');
  setTimeout(() => orb.classList.add('sent'), 400);
  rainbow.classList.add('show');
  try {
    await set(ref(db, 'hugs/dan-to-araceli'), { ts: Date.now(), from: 'dan' });
    fb.textContent = 'Hug sent ✨ Araceli will feel it now';
  } catch(e) {
    fb.textContent = 'Could not send — check your connection';
  }
  setTimeout(() => {
    orb.classList.remove('sending','sent');
    rainbow.classList.remove('show');
    btn.disabled = false;
    fb.textContent = '';
    cooldown = false;
  }, 4000);
};

let lastIncoming = 0;
onValue(ref(db, 'hugs/araceli-to-dan'), snap => {
  const val = snap.val();
  if (!val || !val.ts) return;
  if (val.ts > lastIncoming) {
    lastIncoming = val.ts;
    const dot = document.getElementById('inc-dot');
    const title = document.getElementById('inc-title');
    const sub = document.getElementById('inc-sub');
    const rainbow = document.getElementById('rainbow');
    dot.classList.add('glow');
    title.textContent = 'Araceli sent you a hug 💛';
    sub.textContent = 'She is thinking of you right now';
    rainbow.classList.add('show');
    setTimeout(() => {
      dot.classList.remove('glow');
      title.textContent = 'Waiting for a hug back';
      sub.textContent = "When Araceli sends one, it'll appear here";
      rainbow.classList.remove('show');
    }, 8000);
  }
});
</script>
</body>
</html>
